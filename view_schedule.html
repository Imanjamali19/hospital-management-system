<!DOCTYPE html>
<html lang="fa" dir="rtl">

<head>
    <meta charset="UTF-8">
    <title>نمایشگر مستندات شیفت</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #0d1117;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            font-family: Tahoma, sans-serif;
            overflow: hidden;
        }

        .header {
            background-color: #1f2937;
            width: 100%;
            padding: 15px 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            color: #00fff5;
            box-sizing: border-box;
            position: absolute;
            top: 0;
            left: 0;
            height: 80px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.5);
            border-bottom: 2px solid #00fff5;
            z-index: 10;
        }

        .header h1 {
            margin: 0;
            font-size: 1.8rem;
            text-shadow: 0 0 10px rgba(0, 255, 245, 0.3);
        }

        .clock {
            font-size: 1.8rem;
            font-weight: bold;
            color: #06d6a0;
            direction: ltr;
        }

        /* باکس تصویر کاملاً ریسپانسیو و منعطف برای انواع ابعاد تلویزیون */
        .image-container {
            margin-top: 80px;
            width: 100vw;
            height: calc(100vh - 80px);
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 15px;
            box-sizing: border-box;
            background: radial-gradient(circle, #161b22 0%, #0d1117 100%);
        }

        /* 🔥 جادوی CSS برای نمایش هر سایز عکسی بدون دفرمه شدن */
        .image-container img {
            max-width: 100%;
            max-height: 100%;
            border-radius: 8px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.6);
            object-fit: contain;
            /* عکس هر ابعادی داشته باشه درون کادر فیت میشه و بریده نمیشه */
            background-color: #1f2937;
        }

        .loading-text {
            color: #8b949e;
            font-size: 1.5rem;
            text-align: center;
            font-style: italic;
        }
    </style>
</head>

<body>

    <div class="header">
        <h1 id="pageTitle">در حال بارگذاری مستند...</h1>
        <div class="clock" id="liveClock">00:00:00</div>
    </div>

    <div class="image-container">
        <img id="scheduleImg" style="display: none;" alt="برنامه بارگذاری نشد">
        <div id="noImgText" class="loading-text">در حال دریافت تصویر از سرور بیمارستان...</div>
    </div>

    <script>
        setInterval(() => {
            document.getElementById('liveClock').innerText = new Date().toLocaleTimeString('fa-IR');
        }, 1000);

        const urlParams = new URLSearchParams(window.location.search);
        const type = urlParams.get('type') || 'staff';

        // نقشه عناوین فارسی
        const titles = {
            'staff': '📋 برنامه ماهیانه توزیع پرسنل اتاق عمل',
            'surgeons': '🩺 برنامه آنکالی پزشکان و جراحان جراحی',
            '99': '🚨 برنامه اعضای تیم احیاء کد ۹۹ (CPR)',
            '98': '🫁 برنامه تیم مدیریت اورژانس تنفسی کد ۹۸',
            'training': '📚 تابلوی آموزش و کنفرانس‌های درون‌بخشی',
            'management': '📈 برنامه راند مدیریتی و نظارتی بخش',
            'washing': '🧼 برنامه واشینگ و گندزدایی اتاق‌های عمل',
            'csr': '📦 برنامه شیفت پرسنل استریلیزاسیون مرکزی (CSR)'
        };

        document.getElementById('pageTitle').innerText = titles[type] || 'نمایشگر برنامه مستندات';

        function loadLiveImage() {
            const imgElement = document.getElementById('scheduleImg');
            const noImgText = document.getElementById('noImgText');
            const srcUrl = `api.php?action=get_code_image&type=${type}&_t=${new Date().getTime()}`;

            const testImg = new Image();
            testImg.onload = function () {
                imgElement.src = srcUrl;
                imgElement.style.display = 'block';
                noImgText.style.display = 'none';
            };
            testImg.onerror = function () {
                imgElement.style.display = 'none';
                noImgText.style.display = 'block';
                noImgText.innerText = `هنوز تصویری برای این بخش آپلود نشده است یا فرمت آن نامعتبر است.`;
            };
            testImg.src = srcUrl;
        }

        loadLiveImage();
        // رفرش خودکار تصویر هر ۳۰ ثانیه برای مانیتورهای دیواری بدون نیاز به رفرش دستی
        setInterval(loadLiveImage, 30000);
    </script>
</body>

</html>
