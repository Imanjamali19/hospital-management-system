<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ورود به سیستم مدیریت اتاق عمل</title>
    <style>
        /* رنگ‌بندی دقیقاً استخراج شده از عکس ارسالی */
        :root {
            --bg-page: #b2bacf;       /* رنگ پس زمینه کل صفحه */
            --bg-panel: #b0c0f0;      /* رنگ پنل سمت چپ */
            --btn-color: #6173c9;     /* رنگ دکمه و هاورها */
            --text-dark: #1f1f1f;
            --text-gray: #a0a0a0;
        }

        body {
            font-family: Tahoma, 'Segoe UI', sans-serif;
            background-color: var(--bg-page);
            margin: 0; 
            display: flex; 
            flex-direction: column;
            justify-content: center; 
            align-items: center; 
            height: 100vh;
        }

        /* تیتر بالای صفحه مشابه عکس (Sign up Page) */
        .page-title {
            color: white;
            font-size: 2rem;
            margin-bottom: 20px;
            font-family: serif; /* مشابه فونت عکس */
            text-shadow: 1px 2px 4px rgba(0,0,0,0.2);
        }

        .login-container {
            background: #ffffff;
            width: 90%;
            max-width: 900px;
            min-height: 550px;
            border-radius: 30px;
            box-shadow: 0 15px 40px rgba(0,0,0,0.15);
            display: flex;
            overflow: hidden;
            /* برای اینکه پنل رنگی سمت چپ بیفتد (مشابه عکس) */
            flex-direction: row;
        }

        /* ------------------------------------------- */
        /* پنل فرم ورود (سمت راست - سفید)              */
        /* ------------------------------------------- */
        .form-panel {
            width: 55%;
            padding: 50px 70px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            box-sizing: border-box;
            background: #fff;
        }

        .form-panel h2 {
            color: var(--text-dark);
            font-size: 1.8rem;
            margin: 0 0 40px 0;
            font-family: Tahoma, sans-serif;
            font-weight: 800;
        }

        .input-group {
            margin-bottom: 30px;
            position: relative;
            text-align: right;
        }

        /* استایل مینیمال اینپوت‌ها مشابه عکس */
        .input-group label {
            display: block;
            font-size: 0.85rem;
            color: var(--text-gray);
            margin-bottom: 5px;
        }

        .input-group input {
            width: 100%;
            padding: 10px 5px;
            border: none;
            border-bottom: 2px solid #f0f0f0;
            font-size: 1.05rem;
            color: var(--text-dark);
            outline: none;
            background: transparent;
            transition: 0.3s;
            direction: ltr; /* برای تایپ درست یوزرنیم و پسورد */
            text-align: left;
            font-family: sans-serif;
        }

        .input-group input:focus {
            border-bottom-color: var(--btn-color);
        }

        /* آیکون چشم برای پسورد (تزئینی مشابه عکس) */
        .eye-icon {
            position: absolute;
            left: 5px;
            bottom: 12px;
            width: 20px;
            height: 20px;
            fill: var(--text-gray);
            cursor: pointer;
        }

        .btn-login {
            width: 100%;
            background-color: var(--btn-color);
            color: white;
            border: none;
            padding: 15px;
            border-radius: 12px;
            font-size: 1.1rem;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
            margin-top: 10px;
            box-shadow: 0 8px 15px rgba(97, 115, 201, 0.3);
        }

        .btn-login:hover {
            background-color: #4b5ab3;
            transform: translateY(-2px);
        }

        .error-msg {
            color: #e74c3c;
            font-size: 0.9rem;
            margin-top: 15px;
            display: none;
            font-weight: bold;
            text-align: center;
        }

        .footer-text {
            text-align: center;
            margin-top: 30px;
            font-size: 0.9rem;
            color: var(--text-gray);
        }
        
        .footer-text a {
            color: var(--btn-color);
            text-decoration: none;
            font-weight: bold;
        }

        /* ------------------------------------------- */
        /* پنل بصری (سمت چپ - بنفش ملایم)              */
        /* ------------------------------------------- */
        .visual-panel {
            width: 45%;
            background-color: var(--bg-panel);
            padding: 50px 40px;
            display: flex;
            flex-direction: column;
            position: relative;
            box-sizing: border-box;
            border-radius: 30px 0 0 30px;
        }

        .visual-header {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        /* آیکون دایره‌ای بالای متن */
        .visual-icon-box {
            width: 45px; height: 45px;
            background: white;
            border-radius: 50%;
            display: flex; justify-content: center; align-items: center;
            color: var(--btn-color);
            font-size: 1.2rem;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }

        .visual-header p {
            font-size: 1.2rem;
            line-height: 1.6;
            margin: 0;
            color: #ffffff;
            font-weight: 500;
        }

        /* طراحی سکوی ۳ بعدی (Podium) برای قرارگیری لوگو */
        .visual-image-container {
            flex-grow: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
            margin-top: 60px;
        }

        .podium {
            position: relative;
            width: 200px;
            height: 100px;
        }

        .podium-top {
            position: absolute;
            top: 0; left: 0;
            width: 200px; height: 70px;
            background: #c3cfff;
            border-radius: 50%;
            z-index: 2;
        }

        .podium-base {
            position: absolute;
            top: 35px; left: 0;
            width: 200px; height: 60px;
            background: #8b9ed6;
            border-bottom-left-radius: 100px 35px;
            border-bottom-right-radius: 100px 35px;
            z-index: 1;
            box-shadow: 0 20px 30px rgba(0,0,0,0.1);
        }

        /* قرار دادن لوگوی شما روی سکوی ۳ بعدی */
        .logo-on-podium {
            position: absolute;
            top: -90px;
            left: 50%;
            transform: translateX(-50%);
            width: 110px;
            z-index: 3;
            filter: drop-shadow(0 20px 15px rgba(0,0,0,0.3));
            animation: float 4s ease-in-out infinite;
        }

        @keyframes float {
            0%, 100% { transform: translate(-50%, 0); }
            50% { transform: translate(-50%, -15px); }
        }

        /* ------------------------------------------- */
        /* حالت موبایل                                  */
        /* ------------------------------------------- */
        @media (max-width: 768px) {
            .login-container { flex-direction: column-reverse; min-height: auto; }
            .form-panel { width: 100%; padding: 40px 30px; }
            .visual-panel { width: 100%; border-radius: 30px 30px 0 0; padding: 40px 30px; }
            .page-title { font-size: 1.5rem; }
            .visual-image-container { margin-top: 30px; margin-bottom: 30px; }
        }
    </style>
</head>
<body>

    <div class="page-title">Login Page</div>

    <div class="login-container">
        
        <!-- پنل سمت راست: فرم ورود -->
        <div class="form-panel">
            <h2>ورود به سیستم</h2>

            <div class="input-group">
                <label>شناسه کاربری:</label>
                <input type="text" id="username" placeholder="" autocomplete="off">
            </div>

            <div class="input-group">
                <label>رمز عبور:</label>
                <input type="password" id="password" placeholder="">
                <!-- آیکون چشم تزئینی مشابه عکس -->
                <svg class="eye-icon" viewBox="0 0 24 24">
                    <path d="M12 4.5C7 4.5 2.73 7.61 1 12c1.73 4.39 6 7.5 11 7.5s9.27-3.11 11-7.5c-1.73-4.39-6-7.5-11-7.5zM12 17c-2.76 0-5-2.24-5-5s2.24-5 5-5 5 2.24 5 5-2.24 5-5 5zm0-8c-1.66 0-3 1.34-3 3s1.34 3 3 3 3-1.34 3-3-1.34-3-3-3z"/>
                </svg>
            </div>

            <button class="btn-login" onclick="doLogin()">ورود به داشبورد</button>
            <div class="error-msg" id="errorBox"></div>

            <div class="footer-text">
                نیاز به راهنمایی دارید؟ <a href="#">پشتیبانی IT</a>
            </div>
        </div>

        <!-- پنل سمت چپ: تصویر و رنگ پس‌زمینه -->
        <div class="visual-panel">
            <div class="visual-header">
                <div class="visual-icon-box">🏥</div>
                <p>سیستم مدیریت هوشمند<br>اتاق عمل بیمارستان یثربی</p>
            </div>
            
            <!-- سکوی ۳ بعدی به همراه لوگوی بیمارستان روی آن -->
            <div class="visual-image-container">
                <div class="podium">
                    <div class="podium-top"></div>
                    <div class="podium-base"></div>
                    <img src="./media/LOG2O Qr.png" class="logo-on-podium" alt="لوگو" onerror="this.style.display='none'">
                </div>
            </div>
        </div>

    </div>

    <script>
        document.addEventListener('keypress', function (e) {
            if (e.key === 'Enter') doLogin();
        });

        async function doLogin() {
            const user = document.getElementById('username').value;
            const pass = document.getElementById('password').value;
            const errorBox = document.getElementById('errorBox');
            const btn = document.querySelector('.btn-login');

            if(!user || !pass) {
                errorBox.style.display = 'block';
                errorBox.innerText = 'لطفاً نام کاربری و رمز عبور را وارد کنید.';
                return;
            }

            btn.innerText = "در حال بررسی...";
            errorBox.style.display = 'none';

            const formData = new FormData();
            formData.append('username', user);
            formData.append('password', pass);

            try {
                const response = await fetch('api.php?action=login', { method: 'POST', body: formData });
                const result = await response.json();

                if(result.status === 'success') {
                    window.location.href = 'dashboard.html'; 
                } else {
                    errorBox.style.display = 'block';
                    errorBox.innerText = result.message;
                }
            } catch (error) {
                errorBox.style.display = 'block';
                errorBox.innerText = 'خطا در ارتباط با سرور.';
            } finally {
                if(btn.innerText === "در حال بررسی...") {
                    btn.innerText = "ورود به داشبورد";
                }
            }
        }
    </script>
</body>
</html>
