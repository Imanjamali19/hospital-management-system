<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>مدیریت گزارشات HIT</title>
    <link rel="icon" type="image/png" href="./media/LOG2O Qr.png">
    <script src="https://cdn.jsdelivr.net/npm/persian-date@1.1.0/dist/persian-date.min.js"></script>
    <style>
        body { font-family: Tahoma, sans-serif; background: #f4f7f6; margin: 0; padding: 20px; color: #333; display: flex; gap: 20px; height: 100vh; box-sizing: border-box; }
        
        .form-section { flex: 1; background: #fff; padding: 30px; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); display: flex; flex-direction: column; position: relative;}
        .form-header { color: #d63031; border-bottom: 2px solid #eee; padding-bottom: 15px; margin-bottom: 20px; margin-top: 20px;}
        .date-badge { display: inline-block; background: #fdeaea; color: #d63031; padding: 8px 20px; border-radius: 20px; font-weight: bold; margin-bottom: 20px; font-size: 1.2rem; border: 1px solid #fadbd8;}
        
        .shift-group { margin-bottom: 20px; flex-grow: 1; display: flex; flex-direction: column; }
        .shift-header-wrapper { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
        .shift-group label { font-weight: bold; color: #2c3e50; display: flex; align-items: center; gap: 8px; margin: 0; }
        .author-badge { font-size: 0.8rem; color: #7f8c8d; font-weight: normal; background: #f1f3f5; padding: 3px 10px; border-radius: 10px; }
        
        textarea { width: 100%; flex-grow: 1; padding: 12px; border: 2px solid #e1e8ed; border-radius: 8px; font-family: inherit; font-size: 1rem; resize: none; background: #fafafa; outline: none; transition: 0.3s; box-sizing: border-box;}
        textarea:focus { border-color: #d63031; background: #fff; box-shadow: 0 0 8px rgba(214, 48, 49, 0.1);}
        
        .btn-save { background: #d63031; color: white; border: none; padding: 15px; border-radius: 8px; font-size: 1.2rem; font-weight: bold; cursor: pointer; transition: 0.3s; margin-top: 10px; }
        .btn-save:hover { background: #b02728; }

        .calendar-section { width: 450px; background: #fff; padding: 30px; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); display: flex; flex-direction: column;}
        .cal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .cal-btn { background: #f1f3f5; border: none; padding: 10px 20px; border-radius: 8px; cursor: pointer; font-weight: bold; color: #2c3e50; transition: 0.2s;}
        .cal-btn:hover { background: #e2e8f0; }
        .month-year { font-size: 1.5rem; font-weight: bold; color: #2c3e50; }
        
        .weekdays { display: grid; grid-template-columns: repeat(7, 1fr); text-align: center; font-weight: bold; color: #7f8c8d; margin-bottom: 10px; }
        .days-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 10px; }
        
        .day-cell { aspect-ratio: 1; display: flex; justify-content: center; align-items: center; border-radius: 10px; border: 2px solid #f1f3f5; cursor: pointer; font-size: 1.2rem; font-weight: bold; color: #2c3e50; transition: 0.2s; position: relative; }
        .day-cell:hover { border-color: #d63031; color: #d63031; }
        .day-cell.active { background: #d63031; color: #fff; border-color: #d63031; }
        .day-cell.has-data::after { content: ''; position: absolute; bottom: 5px; width: 6px; height: 6px; background: #2ecc71; border-radius: 50%; }
        .day-cell.empty { visibility: hidden; }
        .back-link { position: absolute; top: 30px; left: 30px; color: #7f8c8d; text-decoration: none; font-weight: bold; background: #f1f3f5; padding: 8px 15px; border-radius: 8px; transition: 0.3s;}
        .back-link:hover { background: #e2e8f0; color: #2c3e50;}
    </style>
</head>
<body>

    <div class="form-section">
        <a href="dashboard.html" class="back-link">🔙 بازگشت به داشبورد</a>
        <h2 class="form-header">🗂️ ثبت گزارشات واحد HIT</h2>
        <div class="date-badge" id="selectedDateDisplay">انتخاب روز از تقویم...</div>
        
        <div class="shift-group">
            <div class="shift-header-wrapper">
                <label>☀️ شیفت صبح</label>
                <div class="author-badge" id="reg_morning"></div>
            </div>
            <textarea id="morning_report" placeholder="آمار و گزارشات شیفت صبح..."></textarea>
        </div>
        <div class="shift-group">
            <div class="shift-header-wrapper">
                <label>🌤️ شیفت عصر</label>
                <div class="author-badge" id="reg_afternoon"></div>
            </div>
            <textarea id="afternoon_report" placeholder="آمار و گزارشات شیفت عصر..."></textarea>
        </div>
        <div class="shift-group">
            <div class="shift-header-wrapper">
                <label>🌙 شیفت شب</label>
                <div class="author-badge" id="reg_night"></div>
            </div>
            <textarea id="night_report" placeholder="آمار و گزارشات شیفت شب..."></textarea>
        </div>
        
        <button class="btn-save" onclick="saveReport()">💾 ذخیره گزارش برای این روز</button>
    </div>

    <div class="calendar-section">
        <div class="cal-header">
            <button class="cal-btn" onclick="changeMonth(1)">بعدی &gt;</button>
            <div class="month-year" id="monthYearDisplay">بارگذاری...</div>
            <button class="cal-btn" onclick="changeMonth(-1)">&lt; قبلی</button>
        </div>
        <div class="weekdays"><div>ش</div><div>ی</div><div>د</div><div>س</div><div>چ</div><div>پ</div><div>ج</div></div>
        <div class="days-grid" id="daysGrid"></div>
    </div>

    <script>
        let currentPDate = new persianDate();
        let selectedDate = currentPDate.format('YYYY/MM/DD');
        let activeDates = [];

        async function fetchActiveDates() {
            try {
                const res = await fetch('api.php?action=get_hit_report_data');
                const json = await res.json();
                if(json.status === 'success') activeDates = json.active_dates || [];
                renderCalendar();
            } catch(e) {}
        }

        function renderCalendar() {
            const daysGrid = document.getElementById('daysGrid');
            daysGrid.innerHTML = '';
            const year = currentPDate.year(); const month = currentPDate.month();
            document.getElementById('monthYearDisplay').innerText = `${currentPDate.format('MMMM')} ${year}`;
            
            const firstDayOfMonth = new persianDate([year, month, 1]);
            let startDayOfWeek = firstDayOfMonth.day();
            const daysInMonth = currentPDate.daysInMonth();

            for(let i = 1; i < startDayOfWeek; i++) { daysGrid.innerHTML += `<div class="day-cell empty"></div>`; }
            for(let d = 1; d <= daysInMonth; d++) {
                const mStr = month < 10 ? '0'+month : month; const dStr = d < 10 ? '0'+d : d;
                const fullDateStr = `${year}/${mStr}/${dStr}`;
                const isActive = fullDateStr === selectedDate ? 'active' : '';
                const hasData = activeDates.includes(fullDateStr) ? 'has-data' : '';
                daysGrid.innerHTML += `<div class="day-cell ${isActive} ${hasData}" onclick="selectDate('${fullDateStr}')">${d}</div>`;
            }
        }

        function changeMonth(offset) { currentPDate = currentPDate.add('months', offset); renderCalendar(); }

        async function selectDate(dateStr) {
            selectedDate = dateStr;
            document.getElementById('selectedDateDisplay').innerText = `تاریخ گزارش: ${dateStr}`;
            renderCalendar(); 
            
            try {
                const res = await fetch(`api.php?action=get_hit_report_data&date=${dateStr}`);
                const json = await res.json();
                
                if (json.status === 'success' && json.data) {
                    document.getElementById('morning_report').value = json.data.morning_report || '';
                    document.getElementById('afternoon_report').value = json.data.afternoon_report || '';
                    document.getElementById('night_report').value = json.data.night_report || '';

                    document.getElementById('reg_morning').innerText = json.data.morning_reg ? `ثبت: ${json.data.morning_reg}` : '';
                    document.getElementById('reg_afternoon').innerText = json.data.afternoon_reg ? `ثبت: ${json.data.afternoon_reg}` : '';
                    document.getElementById('reg_night').innerText = json.data.night_reg ? `ثبت: ${json.data.night_reg}` : '';
                } else {
                    document.getElementById('morning_report').value = '';
                    document.getElementById('afternoon_report').value = '';
                    document.getElementById('night_report').value = '';
                    document.getElementById('reg_morning').innerText = '';
                    document.getElementById('reg_afternoon').innerText = '';
                    document.getElementById('reg_night').innerText = '';
                }
            } catch (e) {}
        }

        async function saveReport() {
            const formData = new FormData();
            formData.append('report_date', selectedDate);
            formData.append('morning_report', document.getElementById('morning_report').value);
            formData.append('afternoon_report', document.getElementById('afternoon_report').value);
            formData.append('night_report', document.getElementById('night_report').value);

            const btn = document.querySelector('.btn-save'); btn.innerText = "در حال ذخیره...";
            try {
                const res = await fetch('api.php?action=save_hit_report', { method: 'POST', body: formData });
                const json = await res.json();
                if(json.status === 'success') {
                    if(!activeDates.includes(selectedDate)) activeDates.push(selectedDate);
                    alert('گزارش با موفقیت ذخیره شد!');
                    selectDate(selectedDate); // رفرش برای نمایش اسم نویسنده‌ها
                }
            } catch (e) { alert('خطا در ارتباط با سرور'); } finally { btn.innerText = "💾 ذخیره گزارش برای این روز"; }
        }

        fetchActiveDates(); selectDate(selectedDate);
    </script>
</body>
</html>
